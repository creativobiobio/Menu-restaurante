<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newen Creativo - KDS Cocina</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #eef2f5; --blanco: #ffffff; --texto: #2c3e50; --borde: #bdc3c7; --rojo-alerta: #e74c3c; --verde-listo: #27ae60; }
        body { background-color: var(--fondo); color: var(--texto); font-family: 'Roboto', sans-serif; margin: 0; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: 100vh; box-sizing: border-box; }
        .panel-tickets { display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; overflow-y: auto; }
        .ticket { background: var(--blanco); border: 2px solid var(--borde); border-radius: 8px; width: 280px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.3s ease; display: flex; flex-direction: column; }
        .ticket-header { display: flex; justify-content: space-between; font-size: 1.3em; font-weight: bold; border-bottom: 2px solid var(--texto); padding-bottom: 10px; margin-bottom: 15px; }
        .item-pedido { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--borde); }
        .item-nombre { font-weight: bold; font-size: 1.2em; }
        .modificador { font-size: 1em; margin-left: 10px; font-weight: bold; }
        .modificador.quitar { color: #c0392b; } .modificador.agregar { color: #27ae60; } .modificador.base { color: #2980b9; }
        .nota { font-size: 0.95em; font-weight: bold; background: #f1c40f; padding: 5px; margin-top: 5px; border-radius: 4px; }
        .btn-listo { width: 100%; background: var(--verde-listo); color: white; border: none; padding: 15px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .panel-resumen { background: var(--blanco); border: 2px solid var(--borde); border-radius: 8px; padding: 20px; overflow-y: auto; }
        .resumen-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        @keyframes parpadeoRojo { 0% { background-color: var(--blanco); } 50% { background-color: #ffcccc; } 100% { background-color: var(--blanco); } }
        .urgente { animation: parpadeoRojo 1.5s infinite; }
    </style>
</head>
<body>
    <div class="panel-tickets" id="contenedor-tickets"></div>
    <div class="panel-resumen"><h2>Cola</h2><div id="lista-resumen"></div></div>
    <script>
        // URL CONECTADA EXACTAMENTE A TU BASE DE DATOS
        const API_URL = 'https://script.google.com/macros/s/AKfycbxXQAHi_yvIpViecP0MbBme6WNdGkpsXhCK_vQjzlG_kXwaOgdV-GERyjdb6HAR-0N2kQ/exec';
        
        async function cargar() {
            try {
                const res = await fetch(`${API_URL}?action=getPedidos`); const pedidos = await res.json();
                const cont = document.getElementById('contenedor-tickets'); cont.innerHTML = '';
                let resumen = {};
                pedidos.reverse().forEach(p => {
                    const t = document.createElement('div'); t.className = 'ticket'; t.dataset.id = p.id; t.dataset.time = p.timestamp;
                    let itemsH = '';
                    p.items.forEach(i => {
                        resumen[i.nombre] = (resumen[i.nombre] || 0) + 1;
                        let modsH = '';
                        if(i.baseE?.length) i.baseE.forEach(x => modsH += `<div class="modificador base">🥣 BASE: ${x.toUpperCase()}</div>`);
                        if(i.protE?.length) i.protE.forEach(x => modsH += `<div class="modificador base">🥩 PROT: ${x.toUpperCase()}</div>`);
                        if(i.sin?.length) i.sin.forEach(x => modsH += `<div class="modificador quitar">- SIN ${x.toUpperCase()}</div>`);
                        if(i.con?.length) i.con.forEach(x => modsH += `<div class="modificador agregar">+ EXTRA ${x.toUpperCase()}</div>`);
                        itemsH += `<div class="item-pedido"><div class="item-nombre">1x ${i.nombre}</div>${modsH}${i.notas?`<div class="nota">📝 ${i.notas}</div>`:''}</div>`;
                    });
                    const h = new Date(p.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    t.innerHTML = `<div class="ticket-header"><span>Mesa: ${p.mesa}</span><span>⏱️ ${h}</span></div>${itemsH}<button class="btn-listo" onclick="marcar('${p.id}')">LISTO</button>`;
                    cont.appendChild(t);
                });
                const lr = document.getElementById('lista-resumen'); lr.innerHTML = '';
                for (const [k, v] of Object.entries(resumen)) { lr.innerHTML += `<div class="resumen-item"><span>${k}</span><strong>${v}</strong></div>`; }
                verificar();
            } catch (e) {}
        }
        async function marcar(id) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'actualizarEstado', idPedido: id, nuevoEstado: 'Listo' }) }); cargar(); }
        function verificar() {
            const ahora = new Date().getTime();
            document.querySelectorAll('.ticket').forEach(t => {
                if ((ahora - new Date(t.dataset.time).getTime()) / 60000 >= 20) t.classList.add('urgente');
            });
        }
        window.onload = () => { cargar(); setInterval(cargar, 10000); };
    </script>
</body>
</html>
