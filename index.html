<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Burger - Panel de Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { Plus, X, Utensils, Coffee, Flame, Salad, ClipboardList, MapPin, CheckCircle2, Minus, Loader2, AlertCircle } = lucide;

        const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4yZc7M7meCPQ6Mc0WmYpw08NceifjZ2ccaXCgCImrOePe46mgGKnAdaeLVVf6Zu2PfMUpO7NYJ7tD/pub?gid=0&single=true&output=csv";

        // Limpieza profunda de texto para comparaciones
        const clean = (txt) => (txt || "").toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        const formatPrice = (p) => `$${(Number(p) || 0).toLocaleString('es-CL')}`;

        const App = () => {
            const [menu, setMenu] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('burgers');
            const [cart, setCart] = React.useState([]);
            const [table, setTable] = React.useState('');
            const [selected, setSelected] = React.useState(null);
            const [isPreview, setIsPreview] = React.useState(false);

            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(API_URL);
                        if (!res.ok) throw new Error("No se pudo obtener el CSV. ¿Está publicado?");
                        const csvText = await res.text();
                        
                        const lines = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
                        if (lines.length < 2) throw new Error("La planilla parece estar vacía.");

                        // Mapeo dinámico de cabeceras
                        const headers = lines[0].split(',').map(h => clean(h).replace(/[^a-z]/g, ''));
                        
                        const items = lines.slice(1).map(line => {
                            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            const obj = {};
                            headers.forEach((h, i) => {
                                let val = values[i] ? values[i].trim().replace(/^"|"$/g, '') : "";
                                obj[h] = val;
                            });
                            return obj;
                        });

                        // Agrupación por categoría normalizada
                        const getCat = (name) => items.filter(i => clean(i.categoria) === clean(name));

                        setMenu({
                            burgers: getCat('burgers'),
                            makebowl: getCat('makebowl'),
                            hotbowls: getCat('hotbowls'),
                            churrascos: getCat('churrascos'),
                            calientes: getCat('calientes'),
                            frios: getCat('frios')
                        });
                        setLoading(false);
                    } catch (err) {
                        setError(err.message);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-black">
                    <Loader2 className="animate-spin text-yellow-500 mb-4" size={40} />
                    <p className="text-zinc-500 font-bold uppercase text-[10px] tracking-[0.3em]">Sincronizando con Google Sheets</p>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">
                    <AlertCircle className="text-red-500 mb-4" size={48} />
                    <h2 className="text-yellow-500 font-black uppercase mb-2">Error de Sincronización</h2>
                    <p className="text-zinc-500 text-sm mb-6">{error}</p>
                    <div className="bg-zinc-900 p-4 rounded-xl text-left text-[10px] text-zinc-400 mb-6 w-full max-w-xs overflow-auto">
                        <p className="font-bold text-white mb-1">Checklist de solución:</p>
                        <ol className="list-decimal ml-4 space-y-1">
                            <li>Archivo > Compartir > Publicar en la Web.</li>
                            <li>Elegir formato "Valores separados por comas (.csv)".</li>
                            <li>Asegurar que la columna "categoria" esté escrita exactamente igual en el Excel.</li>
                        </ol>
                    </div>
                    <button onClick={()=>location.reload()} className="bg-yellow-500 text-black px-10 py-3 rounded-full font-black uppercase text-xs">Reintentar Ahora</button>
                </div>
            );

            const activeItems = activeTab === 'bebestibles' ? [...menu.calientes, ...menu.frios] : (menu[activeTab] || []);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-black">
                    <header className="p-6 sticky top-0 bg-black/90 backdrop-blur-md z-40 border-b border-zinc-900">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter">MAKE YOUR BURGER</h1>
                                <p className="text-[10px] text-zinc-600 font-bold mt-1 tracking-widest uppercase">Menú Digital v2.0</p>
                            </div>
                            <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-2 flex flex-col items-center">
                                <span className="text-[8px] text-zinc-500 font-black uppercase mb-1">Mesa</span>
                                <input type="number" placeholder="00" value={table} onChange={e=>setTable(e.target.value)} className="w-8 bg-transparent text-center text-yellow-500 font-black outline-none" />
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                            {[
                                {id:'burgers', icon:Flame, label:'Burgers'},
                                {id:'makebowl', icon:Salad, label:'Bowl'},
                                {id:'hotbowls', icon:Utensils, label:'Hot Bowls'},
                                {id:'churrascos', icon:ClipboardList, label:'Churrascos'},
                                {id:'bebestibles', icon:Coffee, label:'Bebidas'}
                            ].map(t => (
                                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`px-4 py-3 rounded-2xl flex flex-col items-center min-w-[75px] transition-all ${activeTab === t.id ? 'bg-yellow-500 text-black' : 'bg-zinc-900 text-zinc-500'}`}>
                                    <t.icon size={16} />
                                    <span className="text-[8px] font-black uppercase mt-1 tracking-tighter">{t.label}</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-6 pb-32 flex-1">
                        {activeItems.length === 0 ? (
                            <div className="py-20 text-center opacity-20">
                                <Utensils className="mx-auto mb-4" size={48} />
                                <p className="text-xs font-black uppercase tracking-widest">No hay productos en esta categoría</p>
                            </div>
                        ) : activeItems.map(item => {
                            const isAvailable = (item.disponible || "").trim().toUpperCase() === 'SI';
                            return (
                                <div key={item.id} className={`p-6 bg-zinc-900/20 border border-zinc-900 rounded-[2.5rem] mb-4 ${!isAvailable ? 'opacity-20 grayscale pointer-events-none' : ''}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex-1">
                                            <h3 className="text-lg font-black uppercase italic leading-tight">{item.nombre}</h3>
                                            <p className="text-[11px] text-zinc-500 mt-2 leading-tight">{item.descripcion || "Sin descripción disponible."}</p>
                                        </div>
                                        <span className="text-white font-black text-xl ml-4 tracking-tighter">{formatPrice(item.precio)}</span>
                                    </div>
                                    <button onClick={()=>{
                                        const finalPrice = Number(item.precio || 0);
                                        setCart([...cart, { ...item, cartId: Math.random(), finalPrice }]);
                                    }} className="w-full bg-zinc-900 text-zinc-400 py-3 rounded-xl font-black text-[10px] uppercase border border-zinc-800 hover:bg-yellow-500 hover:text-black transition-all">Agregar al Pedido</button>
                                </div>
                            );
                        })}
                    </main>

                    {cart.length > 0 && (
                        <div className="fixed bottom-6 left-6 right-6 z-50 max-w-md mx-auto">
                            <button onClick={()=>setIsPreview(true)} className="w-full bg-yellow-500 text-black h-16 rounded-[1.5rem] flex justify-between items-center px-8 shadow-2xl font-black italic active:scale-95 transition-all">
                                <div className="flex items-center gap-4">
                                    <div className="bg-black text-white px-3 py-1 rounded-full text-[10px] font-black">{cart.length}</div>
                                    <span className="uppercase tracking-tighter">Mi Pedido</span>
                                </div>
                                <span className="text-xl tracking-tighter">{formatPrice(cart.reduce((s,i)=>s+i.finalPrice, 0))}</span>
                            </button>
                        </div>
                    )}

                    {isPreview && (
                        <div className="fixed inset-0 z-[70] bg-black p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-4xl font-black italic text-yellow-500 tracking-tighter uppercase leading-none">Mi Pedido</h2>
                                <button onClick={()=>setIsPreview(false)} className="bg-zinc-900 p-3 rounded-full"><X size={24}/></button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                                {cart.map((item, idx) => (
                                    <div key={item.cartId} className="bg-zinc-900/50 p-6 rounded-[2.5rem] border border-zinc-800 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-black text-lg uppercase italic leading-tight">{item.nombre}</h4>
                                            <span className="text-yellow-500 font-black text-sm">{formatPrice(item.finalPrice)}</span>
                                        </div>
                                        <button onClick={()=>{
                                            const nc = [...cart]; nc.splice(idx,1); setCart(nc);
                                            if(nc.length === 0) setIsPreview(false);
                                        }} className="text-zinc-700 hover:text-red-500 p-2"><Minus size={24}/></button>
                                    </div>
                                ))}
                            </div>
                            <div className="pt-8 border-t border-zinc-900 mt-6">
                                <div className="flex justify-between items-end mb-8">
                                    <div><span className="text-zinc-600 text-[10px] font-black uppercase block mb-1">Mesa {table || '?'}</span><span className="text-5xl font-black italic tracking-tighter">{formatPrice(cart.reduce((s,i)=>s+i.finalPrice, 0))}</span></div>
                                </div>
                                <button disabled={!table} onClick={()=>{alert("¡Pedido enviado!"); setCart([]); setIsPreview(false);}} className="w-full bg-white text-black font-black py-6 rounded-[2.5rem] text-xl uppercase tracking-tighter disabled:opacity-20 hover:bg-yellow-500 transition-all">Confirmar Pedido</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
