<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newen Creativo - Menú Mesero</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --negro-fondo: #1a1a1a;
            --negro-tarjeta: #252525;
            --blanco: #ffffff;
            --gris: #888;
        }

        body {
            background-color: var(--negro-fondo);
            color: var(--blanco);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; /* Espacio para el pie de página fijo */
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 150px;
            filter: drop-shadow(0px 4px 10px rgba(212, 175, 55, 0.3));
        }

        .config-mesa {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"], textarea {
            background: var(--negro-tarjeta);
            border: 1px solid var(--oro);
            color: var(--blanco);
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--negro-tarjeta);
            border-left: 4px solid var(--oro);
            padding: 20px;
            border-radius: 8px;
            position: relative;
            transition: transform 0.2s;
        }

        .card.agotado {
            opacity: 0.4;
            filter: grayscale(1);
            pointer-events: none;
        }

        .agotado-badge {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .card.agotado .agotado-badge {
            display: block;
        }

        .card h3 {
            color: var(--oro);
            margin: 0 0 10px 0;
            font-family: 'Playfair Display', serif;
        }

        .precio {
            font-weight: 600;
            color: var(--oro);
            display: block;
            margin-bottom: 10px;
        }

        .seccion-ingredientes {
            margin-top: 15px;
            font-size: 0.9em;
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .input-notas {
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            font-size: 0.85em;
            resize: none;
            height: 60px;
        }

        .btn-agregar {
            background: var(--oro);
            color: var(--negro-fondo);
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
        }

        #resumen-pedido {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--oro);
            color: var(--negro-fondo);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .btn-enviar {
            background: var(--negro-fondo);
            color: var(--oro);
            border: 2px solid var(--negro-fondo);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <div class="config-mesa">
            <label>Mesa: <input type="number" id="numMesa" placeholder="0" style="width: 60px;"></label>
        </div>
    </header>

    <div class="menu-container" id="menuLista">
        <p style="text-align: center; width: 100%;">Cargando menú...</p>
    </div>

    <div id="resumen-pedido">
        <span id="totalItems">Items en carrito: 0</span>
        <button class="btn-enviar" onclick="enviarPedido()">ENVIAR A COCINA</button>
    </div>

    <script>
        // URL ACTUALIZADA
        const API_URL = 'https://script.google.com/macros/s/AKfycbxfCjcNSromuRtOKSBaTpucj6aQHkmwixw8ImYmTwJhMLySeiFT_NrhiUvcMaktukNi/exec';
        let carrito = [];

        async function cargarMenu() {
            try {
                const res = await fetch(`${API_URL}?action=getMenu`);
                const data = await res.json();
                const container = document.getElementById('menuLista');
                container.innerHTML = ''; 
                
                data.forEach((plato, index) => {
                    const estaAgotado = plato.disponible === 'no';
                    const card = document.createElement('div');
                    card.className = `card ${estaAgotado ? 'agotado' : ''}`;
                    
                    let htmlIngredientesBase = '';
                    if (plato.ingredientesBase.length > 0 && plato.ingredientesBase[0] !== "") {
                        htmlIngredientesBase = `
                            <strong>Quitar (Base):</strong>
                            <div class="check-group">
                                ${plato.ingredientesBase.map(ing => `
                                    <label><input type="checkbox" class="base" value="${ing}" checked> ${ing}</label>
                                `).join('')}
                            </div>
                        `;
                    }

                    let htmlIngredientesExtra = '';
                    if (plato.ingredientesExtra.length > 0 && plato.ingredientesExtra[0] !== "") {
                        htmlIngredientesExtra = `
                            <strong>Agregar (Extras):</strong>
                            <div class="check-group">
                                ${plato.ingredientesExtra.map(ing => `
                                    <label><input type="checkbox" class="extra" value="${ing}"> ${ing}</label>
                                `).join('')}
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="agotado-badge">AGOTADO</div>
                        <h3>${plato.nombre}</h3>
                        <p style="font-size: 0.9em; color: #ccc;">${plato.descripcion}</p>
                        <span class="precio">$${plato.precio}</span>
                        
                        <div class="seccion-ingredientes">
                            ${htmlIngredientesBase}
                            ${htmlIngredientesExtra}
                        </div>

                        <textarea class="input-notas" id="notas-${index}" placeholder="Notas: Ej. bien cocido, sin aderezo..."></textarea>
                        <button class="btn-agregar" onclick="agregarAlPedido(${index}, '${plato.nombre}')">${estaAgotado ? 'NO DISPONIBLE' : 'AÑADIR AL PEDIDO'}</button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                document.getElementById('menuLista').innerHTML = '<p>Error al cargar el menú. Verifica la conexión.</p>';
            }
        }

        function agregarAlPedido(index, nombre) {
            const card = document.getElementsByClassName('card')[index];
            const notas = document.getElementById(`notas-${index}`).value;
            
            const quitados = Array.from(card.querySelectorAll('.base:not(:checked)')).map(c => c.value);
            const agregados = Array.from(card.querySelectorAll('.extra:checked')).map(c => c.value);

            const item = {
                nombre: nombre,
                notas: notas,
                sin: quitados,
                con: agregados
            };

            carrito.push(item);
            document.getElementById('totalItems').innerText = `Items en carrito: ${carrito.length}`;
            
            const btn = card.querySelector('.btn-agregar');
            const textoOriginal = btn.innerText;
            btn.innerText = "¡AÑADIDO!";
            btn.style.background = "#fff";
            
            // Limpiar campos después de agregar
            document.getElementById(`notas-${index}`).value = '';
            Array.from(card.querySelectorAll('.base')).forEach(c => c.checked = true);
            Array.from(card.querySelectorAll('.extra')).forEach(c => c.checked = false);

            setTimeout(() => { 
                btn.innerText = textoOriginal; 
                btn.style.background = "var(--oro)"; 
            }, 1000);
        }

        async function enviarPedido() {
            const mesa = document.getElementById('numMesa').value;
            if (!mesa || carrito.length === 0) {
                alert("Por favor ingresa número de mesa y añade al menos un producto.");
                return;
            }

            const btnEnviar = document.querySelector('.btn-enviar');
            btnEnviar.innerText = "ENVIANDO...";
            btnEnviar.disabled = true;

            const payload = {
                action: 'nuevoPedido',
                mesa: mesa,
                items: carrito
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert(`¡Pedido de la Mesa ${mesa} enviado a cocina!`);
                    carrito = [];
                    document.getElementById('totalItems').innerText = `Items en carrito: 0`;
                    document.getElementById('numMesa').value = '';
                }
            } catch (error) {
                alert("Hubo un error al enviar el pedido.");
            } finally {
                btnEnviar.innerText = "ENVIAR A COCINA";
                btnEnviar.disabled = false;
            }
        }

        window.onload = cargarMenu;
    </script>
</body>
</html>
