<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Sabor & Tradición</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .category-tab.active {
            border-bottom: 2px solid #b45309;
            color: #b45309;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Modal Animations */
        .modal-overlay {
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-hidden {
            opacity: 0;
            pointer-events: none;
        }
        .modal-hidden .modal-content {
            transform: scale(0.9) translateY(20px);
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <!-- Encabezado / Hero -->
    <header class="relative h-64 flex items-center justify-center text-white overflow-hidden">

             class="absolute inset-0 w-full h-full object-cover brightness-50">
        <div class="relative text-center z-10 px-4">
            <h1 class="text-5xl font-serif mb-2 text-white">Sabor & Tradición</h1>
            <p class="text-lg font-light tracking-widest uppercase">Cocina de Autor y Pasión</p>
        </div>
    </header>

    <!-- Navegación por Categorías -->
    <nav class="sticky top-0 bg-white/80 backdrop-blur-md shadow-sm z-40 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <div class="flex justify-center p-4 space-x-8 max-w-4xl mx-auto">
            <button onclick="filterMenu('principales')" class="category-tab active px-2 py-1 font-semibold uppercase text-xs tracking-wider transition-all">Principales</button>
            <button onclick="filterMenu('carnes')" class="category-tab px-2 py-1 font-semibold uppercase text-xs tracking-wider transition-all">Carnes</button>
            <button onclick="filterMenu('sandwiches')" class="category-tab px-2 py-1 font-semibold uppercase text-xs tracking-wider transition-all">Sandwiches</button>
            <button onclick="filterMenu('pizzas')" class="category-tab px-2 py-1 font-semibold uppercase text-xs tracking-wider transition-all">Pizzas</button>
        </div>
    </nav>

    <!-- Contenido del Menú -->
    <main class="max-w-5xl mx-auto px-4 py-12">
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 transition-opacity duration-300">
            <!-- Los items se cargarán dinámicamente aquí -->
        </div>
    </main>

    <!-- Modal de Detalles -->
    <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-hidden">
        <div class="absolute inset-0 bg-black/60 modal-overlay" onclick="closeModal()"></div>
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative z-10 modal-content shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/80 hover:bg-white p-2 rounded-full shadow-md z-20 transition-colors">
                <i class="fas fa-times text-stone-800"></i>
            </button>
            
            <div id="modal-body">
                <!-- El contenido se inyecta mediante JS -->
            </div>
        </div>
    </div>

    <!-- Pie de Página / Redes Sociales -->
    <footer class="bg-stone-900 text-stone-300 py-12 px-4 text-center">
        <div class="mb-6">
            <h2 class="text-2xl font-serif text-white mb-4">Visítanos</h2>
            <p>Calle Ficticia 123, Ciudad Ejemplo</p>
            <p>Lun - Dom: 12:00 PM - 11:00 PM</p>

            </a>

            </a>

        function filterMenu(category) {
            const container = document.getElementById('menu-container');
            const tabs = document.querySelectorAll('.category-tab');
            
            tabs.forEach(tab => {
                tab.classList.remove('active');
                if(tab.innerText.toLowerCase().includes(category)) tab.classList.add('active');
            });

            container.style.opacity = '0';
            
            setTimeout(() => {
                const filtered = menuData.filter(item => item.category === category);
                container.innerHTML = filtered.map(item => `
                    <div class="flex flex-col sm:flex-row bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition-all cursor-pointer group" onclick="openDetails(${item.id})">
                        <div class="sm:w-1/3 h-48 sm:h-auto overflow-hidden">
                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        </div>
                        <div class="sm:w-2/3 p-6 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-lg font-serif font-bold text-stone-800 leading-tight">${item.name}</h3>
                                    <span class="text-amber-700 font-bold ml-2">${item.price}</span>
                                </div>
                                <p class="text-stone-500 text-sm leading-relaxed line-clamp-2">${item.description}</p>
                            </div>
                            <div class="mt-4 flex items-center text-xs text-amber-600 font-semibold uppercase tracking-wider">
                                <span>Ver detalles</span>
                                <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                            </div>
                        </div>
                    </div>
                `).join('');
                container.style.opacity = '1';
            }, 250);
        }

        function openDetails(id) {
            const item = menuData.find(i => i.id === id);
            const modal = document.getElementById('detail-modal');
            const body = document.getElementById('modal-body');

            body.innerHTML = `
                <div class="relative h-64 sm:h-80 overflow-hidden">
                    <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6">
                        <span class="inline-block px-2 py-1 bg-amber-500 text-white text-[10px] font-bold uppercase tracking-tighter rounded mb-2">${item.category}</span>
                        <h2 class="text-3xl font-serif text-white">${item.name}</h2>
                    </div>
                </div>
                <div class="p-8">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-2xl font-bold text-amber-700">${item.price}</span>
                        <div class="flex space-x-4 text-stone-400">
                            <div class="flex flex-col items-center">
                                <i class="fas fa-fire text-xs"></i>
                                <span class="text-[10px] mt-1 uppercase">${item.calories}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <i class="fas fa-leaf text-xs"></i>
                                <span class="text-[10px] mt-1 uppercase">Fresco</span>
                            </div>
                        </div>
                    </div>

                    <div class="mb-8">
                        <h4 class="text-sm font-semibold uppercase tracking-widest text-stone-400 mb-3 italic">Historia del plato</h4>
                        <p class="text-stone-600 leading-relaxed text-lg font-light">
                            ${item.details}
                        </p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h4 class="text-xs font-bold uppercase tracking-widest text-stone-800 mb-4 border-b pb-2">Ingredientes Clave</h4>
                            <ul class="space-y-2">
                                ${item.ingredients.map(ing => `
                                    <li class="text-sm text-stone-500 flex items-center">
                                        <span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-3"></span>
                                        ${ing}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold uppercase tracking-widest text-stone-800 mb-4 border-b pb-2">Alérgenos</h4>
                            <div class="flex flex-wrap gap-3">
                                <div class="bg-stone-100 p-2 rounded-lg text-stone-400 hover:text-amber-600 transition-colors cursor-help" title="Contiene Gluten">
                                    <i class="fas fa-wheat-awn"></i>
                                </div>
                                <div class="bg-stone-100 p-2 rounded-lg text-stone-400 hover:text-amber-600 transition-colors cursor-help" title="Contiene Lácteos">
                                    <i class="fas fa-cow"></i>
                                </div>
                                <div class="bg-stone-100 p-2 rounded-lg text-stone-400 hover:text-green-600 transition-colors cursor-help" title="Natural">
                                    <i class="fas fa-seedling"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="closeModal()" class="w-full mt-10 bg-stone-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-stone-800 transition-colors">
                        Regresar al Menú
                    </button>
                </div>
            `;

            modal.classList.remove('modal-hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('modal-hidden');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        window.onload = () => filterMenu('principales');
    </script>
</body>
</html>
