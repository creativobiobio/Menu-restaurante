<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Miggas - Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f6f1e7;
  --card:#ffffff;
  --accent:#7a2e2e;
  --accent-soft:#a44a4a;
  --text:#3b2f2f;
  --muted:#8b7e7e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

#splash{
  position:fixed;
  inset:0;
  background:#f6f1e7;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity 0.8s ease;
}

#splash.oculto{
  opacity:0;
  pointer-events:none;
}

.splash-title{
  font-family:"Playfair Display";
  font-size:36px;
  font-weight:600;
  color:var(--accent);
  letter-spacing:6px;
  margin-bottom:6px;
}

.splash-sub{
  font-family:Inter;
  font-size:11px;
  font-weight:400;
  color:var(--muted);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:36px;
}

.splash-spinner{
  width:34px;
  height:34px;
  border:2px solid #ddd;
  border-top:2px solid var(--accent);
  border-right:2px solid var(--accent-soft);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

header{
  padding:30px 20px 10px;
  text-align:center;
}

.logo{
  display:block;
  margin:auto;
  width:280px;
  margin-bottom:15px;
}

@media(min-width:700px){
  .logo{ width:360px; }
}

.search-box{
  max-width:900px;
  margin:0 auto 20px auto;
  padding:0 20px;
}

.search-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  background:#fff;
  color:var(--text);
}

.search-box input::placeholder{ color:#bbb; }

.category-bar{
  max-width:900px;
  margin:auto;
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px 20px;
}

.cat-btn{
  background:white;
  border:1px solid #ddd;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  white-space:nowrap;
  color:var(--text);
  transition:0.25s;
}

.cat-btn:hover{
  border:1px solid var(--accent);
}

.cat-btn.active{
  background:var(--accent);
  color:white;
  border:none;
}

.menu{
  max-width:900px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}

@media(min-width:700px){
  .menu{ grid-template-columns:1fr 1fr; }
}

.card{
  display:flex;
  align-items:center;
  background:var(--card);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
  position:relative;
  border:1px solid #ece5d8;
  transition:0.2s;
}

.card:hover{
  border:1px solid rgba(122,46,46,0.35);
  transform:scale(1.01);
}

.agotado{
  opacity:0.45;
  filter:grayscale(0.9);
}

.agotado::after{
  content:"AGOTADO";
  position:absolute;
  top:8px;
  right:8px;
  background:var(--accent);
  color:white;
  font-size:9px;
  padding:3px 6px;
  border-radius:4px;
}

.img{
  width:120px;
  height:120px;
  background:#eee;
  flex-shrink:0;
  align-self:stretch;
}

.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.info{
  padding:12px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-width:0;
}

.title{
  font-family:"Playfair Display";
  font-size:16px;
  margin-bottom:4px;
}

.desc{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
  min-height:16px;
}

.adicionales{
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
  line-height:1.4;
}

.adicionales-label{
  color:var(--accent);
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:2px;
}

.bottom{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
}

.price{
  font-weight:700;
  font-size:14px;
  color:var(--accent);
  white-space:nowrap;
}

.badge{
  font-size:10px;
  background:#eee;
  padding:3px 8px;
  border-radius:6px;
  color:var(--text);
  white-space:nowrap;
}

.precios{
  display:flex;
  flex-direction:column;
  gap:2px;
  align-items:flex-end;
}

.precio-fila{
  display:flex;
  align-items:center;
  gap:5px;
}

.precio-label{
  font-size:10px;
  color:var(--muted);
  white-space:nowrap;
}

.precio-valor{
  font-weight:700;
  font-size:13px;
  color:var(--accent);
  white-space:nowrap;
}

footer{
  text-align:center;
  padding:40px 20px;
  color:var(--muted);
  font-size:12px;
}

.creativo-link{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:25px;
  text-decoration:none;
  transition:0.3s;
}

.creativo-link:hover{ opacity:0.7; }

.creativo-logo{
  width:55px;
  border-radius:6px;
  margin-bottom:6px;
}

.creativo-text{
  font-size:10px;
  letter-spacing:2px;
  color:var(--accent);
  font-weight:600;
  text-transform:uppercase;
}

</style>
</head>

<body>

<div id="splash">
  <div class="splash-title">4 MIGGAS</div>
  <div class="splash-sub">Restaurante</div>
  <div class="splash-spinner"></div>
</div>

<header>
  <img src="logo.png" class="logo">
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar en el menú...">
  </div>
</header>

<div class="category-bar" id="cats"></div>
<div class="menu" id="menu"></div>

<footer>
  CURANILAHUE · CHILE
  <a href="https://www.instagram.com/newenbiobiodigital?igsh=dGZnY2JyMGVydDVq" target="_blank" class="creativo-link">
    <img src="creativo.png" class="creativo-logo">
    <span class="creativo-text">Desarrollado por CREATIVO</span>
  </a>
</footer>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRKndmjX1CcpICAtCKFwhPwomV8wbnPNgl_s2Bo9rHv9Y4Gq0UPU-tG_XqjCmP2671jzn6QnrdRtYwe/pub?gid=0&single=true&output=csv";

let items=[];
let menuListo=false;
let tiempoMinimoCumplido=false;

function intentarOcultarSplash(){
  if(menuListo && tiempoMinimoCumplido){
    document.getElementById("splash").classList.add("oculto");
  }
}

function parsearFila(row){
  const cols=[];
  let actual="";
  let entreComillas=false;
  for(let i=0;i<row.length;i++){
    const c=row[i];
    if(c==='"'){ entreComillas=!entreComillas; continue; }
    if(c===',' && !entreComillas){ cols.push(actual.trim()); actual=""; continue; }
    actual+=c;
  }
  cols.push(actual.trim());
  return cols;
}

async function load(){
  setTimeout(()=>{
    tiempoMinimoCumplido=true;
    intentarOcultarSplash();
  },1800);

  try{
    const url=SHEET_URL+"&t="+Date.now();
    const r=await fetch(url);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const t=await r.text();
    const rows=t.split(/\r?\n/).slice(1);
    items=rows.map(row=>{
      try{
        if(!row.trim()) return null;
        const clean=parsearFila(row);
        if(clean.length<4) return null;
        return{
          cat:        clean[0]||"Otros",
          name:       clean[1]||"",
          desc:       clean[2]||"",
          price:      clean[3]||"0",
          stock:      clean[4]||"SI",
          img:        clean[5]||"",
          etiqueta1:  clean[6]||"",
          precio1:    clean[7]||"",
          etiqueta2:  clean[8]||"",
          precio2:    clean[9]||"",
          adicionales:clean[10]||""
        };
      }catch{
        return null;
      }
    }).filter(Boolean);
    renderCats();
    renderMenu("Todo");
  }catch(e){
    console.error(e);
    document.getElementById("menu").innerHTML=
      '<div style="text-align:center;padding:60px 20px;color:#8b7e7e">Error al cargar el menú.<br><br>'+
      '<button onclick="location.reload()" style="background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px">Reintentar</button></div>';
  }finally{
    menuListo=true;
    intentarOcultarSplash();
  }
}

function renderCats(){
  const cats=[...new Set(items.map(i=>i.cat))];
  const container=document.getElementById("cats");
  container.innerHTML="";
  const all=["Todo",...cats];
  all.forEach(c=>{
    const count=c==="Todo"?items.length:items.filter(i=>i.cat===c).length;
    const btn=document.createElement("button");
    btn.className="cat-btn";
    btn.innerText=c+" ("+count+")";
    btn.onclick=()=>{
      document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      renderMenu(c);
    };
    container.appendChild(btn);
  });
  container.firstChild.classList.add("active");
}

function renderPrecio(i){
  if(i.etiqueta1){
    return`
      <div class="precios">
        <div class="precio-fila">
          <span class="precio-label">${i.etiqueta1}</span>
          <span class="precio-valor">$ ${Number(i.precio1).toLocaleString("es-CL")}</span>
        </div>
        ${i.etiqueta2?`
        <div class="precio-fila">
          <span class="precio-label">${i.etiqueta2}</span>
          <span class="precio-valor">$ ${Number(i.precio2).toLocaleString("es-CL")}</span>
        </div>`:""}
      </div>
    `;
  }
  return`<div class="price">$ ${Number(i.price).toLocaleString("es-CL")}</div>`;
}

function renderMenu(cat){
  const container=document.getElementById("menu");
  let filtered=cat==="Todo"?items:items.filter(i=>i.cat===cat);
  const q=document.getElementById("search").value.toLowerCase();
  if(q){
    filtered=filtered.filter(i=>
      i.name.toLowerCase().includes(q)||
      i.desc.toLowerCase().includes(q)
    );
  }

  filtered.sort((a,b)=>{
    const aOff=a.stock?.toUpperCase()==="NO"?1:0;
    const bOff=b.stock?.toUpperCase()==="NO"?1:0;
    return aOff-bOff;
  });

  container.innerHTML=filtered.map(i=>`
    <div class="card ${i.stock?.toUpperCase()==="NO"?"agotado":""}">
      <div class="img">
        ${i.img?`<img src="${i.img}">`:""}
      </div>
      <div class="info">
        <div>
          <div class="title">${i.name}</div>
          <div class="desc">${i.desc||""}</div>
          ${i.adicionales?`
          <div class="adicionales">
            <div class="adicionales-label">Adicionales</div>
            ${i.adicionales}
          </div>`:""}
        </div>
        <div class="bottom">
          ${renderPrecio(i)}
          <div class="badge">${i.cat}</div>
        </div>
      </div>
    </div>
  `).join("");
}

document.getElementById("search").addEventListener("input",()=>{
  const active=document.querySelector(".cat-btn.active");
  renderMenu(active?active.innerText.split(" (")[0]:"Todo");
});

load();

</script>

</body>
</html>
