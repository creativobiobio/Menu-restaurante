<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital Actualizable</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --price: #27ae60;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        .categoria-titulo {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plato {
            display: flex;
            background: white;
            margin: 15px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .plato:hover {
            transform: translateY(-3px);
        }

        .plato.agotado {
            filter: grayscale(1);
            opacity: 0.6;
        }

        .foto-plato {
            width: 120px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .info-plato {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .nombre-plato {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .precio-plato {
            color: var(--price);
            font-size: 1.1rem;
        }

        .descripcion-plato {
            font-size: 0.9rem;
            color: #666;
        }

        .status-badge {
            font-size: 0.7rem;
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        @media (max-width: 480px) {
            .plato { flex-direction: column; }
            .foto-plato { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nuestra Carta</h1>
        <div id="menu-content">Cargando menú actualizado...</div>
    </div>

    <script>
        // URL de tu Google Sheet en formato CSV
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgQ-ZRf2h64mfosx951LpKzVI5lIPAOuyb9ocFupCv7PycFK6tfY4tzWoBOOTmBluSXVmgH86YumWY/pub?gid=0&single=true&output=csv';

        async function initMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                
                // Procesar filas del CSV
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('menu-content');
                container.innerHTML = '';

                let currentCategory = '';

                rows.forEach(row => {
                    // Manejo básico de CSV (separado por comas)
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length < 5) return;

                    const [categoria, nombre, descripcion, precio, disponible, fotoUrl] = columns.map(c => c.replace(/"/g, '').trim());

                    // Insertar encabezado de categoría
                    if (categoria !== currentCategory) {
                        currentCategory = categoria;
                        const catHeader = document.createElement('h2');
                        catHeader.className = 'categoria-titulo';
                        catHeader.textContent = categoria;
                        container.appendChild(catHeader);
                    }

                    const isAvailable = disponible.toUpperCase() === 'SI';
                    
                    const platoHtml = `
                        <div class="plato ${!isAvailable ? 'agotado' : ''}">
                            ${fotoUrl ? `<img src="${fotoUrl}" class="foto-plato" alt="${nombre}">` : '<div class="foto-plato" style="background:#ddd"></div>'}
                            <div class="info-plato">
                                <div class="nombre-plato">
                                    ${nombre}
                                    ${!isAvailable ? '<span class="status-badge">AGOTADO</span>' : ''}
                                    <span class="precio-plato">$${precio}</span>
                                </div>
                                <div class="descripcion-plato">${descripcion}</div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', platoHtml);
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('menu-content').innerHTML = 'Hubo un problema al cargar el menú. Por favor, reintenta en unos momentos.';
            }
        }

        initMenu();
    </script>
</body>
</html>
