<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Burger - Menú Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loader-init { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="loader-init">Iniciando sistema...</div>
    <div id="root"></div>

    <script type="text/babel">
        // Verificación de seguridad para Lucide
        const I = (name) => {
            const Icon = window.lucide ? window.lucide[name] : null;
            return Icon ? <Icon size={18} /> : <span>•</span>;
        };

        const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4yZc7M7meCPQ6Mc0WmYpw08NceifjZ2ccaXCgCImrOePe46mgGKnAdaeLVVf6Zu2PfMUpO7NYJ7tD/pub?gid=0&single=true&output=csv";

        const clean = (t) => (t || "").toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const formatPrice = (p) => `$${(Number(p) || 0).toLocaleString('es-CL')}`;

        const App = () => {
            const [rawData, setRawData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('burgers');
            const [cart, setCart] = React.useState([]);
            const [table, setTable] = React.useState('');
            const [isPreview, setIsPreview] = React.useState(false);

            React.useEffect(() => {
                // Ocultar cargador inicial
                const l = document.getElementById('loader-init');
                if(l) l.style.display = 'none';

                if (!window.Papa) {
                    setError("Error crítico: No se pudo cargar PapaParse. Revisa tu conexión.");
                    setLoading(false);
                    return;
                }

                window.Papa.parse(API_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        if (results.data && results.data.length > 0) {
                            setRawData(results.data);
                        } else {
                            setError("La planilla de Google Sheets está vacía.");
                        }
                        setLoading(false);
                    },
                    error: (err) => {
                        setError("No se pudo leer el archivo CSV. Verifica la publicación.");
                        setLoading(false);
                    }
                });
            }, []);

            // Filtrado dinámico seguro
            const menu = React.useMemo(() => {
                const get = (c) => rawData.filter(item => clean(item.categoria) === clean(c));
                return {
                    burgers: get('burgers'),
                    makebowl: get('makebowl'),
                    hotbowls: get('hotbowls'),
                    churrascos: get('churrascos'),
                    bebestibles: [...get('calientes'), ...get('frios')]
                };
            }, [rawData]);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-black">
                    <div className="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-zinc-600 font-black text-[10px] uppercase tracking-widest">Sincronizando...</p>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 text-center bg-zinc-950">
                    <div className="text-red-500 mb-6">{I('AlertCircle')}</div>
                    <h2 className="text-yellow-500 font-black uppercase text-xl mb-2">Error de Sincronización</h2>
                    <p className="text-zinc-400 text-sm mb-8">{error}</p>
                    <button onClick={()=>location.reload()} className="bg-white text-black px-8 py-3 rounded-full font-black uppercase text-xs">Reintentar Conexión</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto bg-black min-h-screen flex flex-col">
                    <header className="p-6 sticky top-0 bg-black/90 backdrop-blur-xl z-40 border-b border-zinc-900">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter leading-none">MAKE YOUR BURGER</h1>
                                <p className="text-[10px] text-zinc-500 font-bold mt-1 uppercase flex items-center gap-2">{I('MapPin')} Curanilahue</p>
                            </div>
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-2 px-4 text-center">
                                <span className="text-[8px] text-zinc-500 font-black uppercase block mb-1">Mesa</span>
                                <input type="number" placeholder="00" value={table} onChange={e=>setTable(e.target.value)} className="w-8 bg-transparent text-yellow-500 font-black outline-none text-center" />
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                            {Object.keys(menu).map(cat => (
                                <button key={cat} onClick={()=>setActiveTab(cat)} className={`px-5 py-3 rounded-2xl text-[9px] font-black uppercase transition-all whitespace-nowrap ${activeTab === cat ? 'bg-yellow-500 text-black' : 'bg-zinc-900 text-zinc-500'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-4 pb-32 flex-1">
                        {menu[activeTab]?.map((item, idx) => {
                            const available = clean(item.disponible) === 'si';
                            return (
                                <div key={idx} className={`p-6 bg-zinc-900/30 border border-zinc-900 rounded-[2.5rem] mb-4 transition-all ${!available ? 'opacity-30 grayscale pointer-events-none' : ''}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex-1">
                                            <h3 className="text-lg font-black uppercase italic leading-tight text-white">{item.nombre}</h3>
                                            <p className="text-[11px] text-zinc-500 mt-2 leading-tight">{item.descripcion || "Receta original de la casa."}</p>
                                        </div>
                                        <span className="text-yellow-500 font-black text-xl ml-4">{formatPrice(item.precio)}</span>
                                    </div>
                                    <button 
                                        onClick={()=>{ setCart([...cart, {...item, cartId: Math.random()}]) }}
                                        className="w-full bg-zinc-800 text-zinc-400 py-3 rounded-xl font-black text-[10px] uppercase border border-zinc-700 hover:bg-yellow-500 hover:text-black"
                                    >
                                        Agregar al Pedido
                                    </button>
                                </div>
                            );
                        })}
                    </main>

                    {cart.length > 0 && (
                        <div className="fixed bottom-6 left-4 right-4 z-50">
                            <button onClick={()=>setIsPreview(true)} className="w-full bg-yellow-500 text-black h-16 rounded-[1.5rem] flex justify-between items-center px-8 shadow-2xl font-black italic active:scale-95 transition-all">
                                <span className="uppercase text-xs tracking-tighter">{cart.length} productos</span>
                                <span className="text-lg">{formatPrice(cart.reduce((s,i)=>s+Number(i.precio || 0), 0))}</span>
                            </button>
                        </div>
                    )}

                    {isPreview && (
                        <div className="fixed inset-0 z-[70] bg-black p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-4xl font-black italic text-yellow-500 tracking-tighter uppercase">Mi Pedido</h2>
                                <button onClick={()=>setIsPreview(false)} className="bg-zinc-900 p-3 rounded-full">{I('X')}</button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-3">
                                {cart.map((item, idx) => (
                                    <div key={item.cartId} className="bg-zinc-900/50 p-5 rounded-[2rem] border border-zinc-800 flex justify-between items-center">
                                        <div className="flex flex-col">
                                            <span className="font-black text-white uppercase italic">{item.nombre}</span>
                                            <span className="text-yellow-500 font-bold text-sm">{formatPrice(item.precio)}</span>
                                        </div>
                                        <button onClick={()=>{
                                            const nc = [...cart]; nc.splice(idx,1); setCart(nc);
                                            if(nc.length === 0) setIsPreview(false);
                                        }} className="text-red-500 p-2">{I('Minus')}</button>
                                    </div>
                                ))}
                            </div>
                            <div className="pt-8 border-t border-zinc-900 mt-6">
                                <div className="flex justify-between items-end mb-8">
                                    <div><span className="text-zinc-600 text-[10px] font-black uppercase">Mesa {table || '?'}</span><span className="text-5xl font-black italic block text-white">{formatPrice(cart.reduce((s,i)=>s+Number(i.precio || 0), 0))}</span></div>
                                </div>
                                <button disabled={!table} onClick={()=>{alert("¡Pedido enviado a cocina!"); setCart([]); setIsPreview(false);}} className="w-full bg-white text-black font-black py-6 rounded-2xl text-xl uppercase tracking-tighter disabled:opacity-10">Confirmar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
