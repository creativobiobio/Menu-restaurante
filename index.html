<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newen Creativo - Toma de Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #D4AF37;
            --negro-fondo: #1a1a1a;
            --negro-tarjeta: #252525;
            --blanco: #ffffff;
            --gris: #888;
        }

        body {
            background-color: var(--negro-fondo);
            color: var(--blanco);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 150px;
            filter: drop-shadow(0px 4px 10px rgba(212, 175, 55, 0.3));
        }

        .config-mesa {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"], textarea {
            background: var(--negro-tarjeta);
            border: 1px solid var(--oro);
            color: var(--blanco);
            padding: 10px;
            border-radius: 5px;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--negro-tarjeta);
            border-left: 4px solid var(--oro);
            padding: 20px;
            border-radius: 8px;
            position: relative;
            transition: transform 0.2s;
        }

        .card.agotado {
            opacity: 0.5;
            filter: grayscale(1);
            pointer-events: none;
        }

        .card h3 {
            color: var(--oro);
            margin: 0 0 10px 0;
            font-family: 'Playfair Display', serif;
        }

        .precio {
            font-weight: 600;
            color: var(--oro);
        }

        .seccion-ingredientes {
            margin-top: 15px;
            font-size: 0.9em;
        }

        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .input-notas {
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            font-size: 0.85em;
            resize: none;
        }

        .btn-agregar {
            background: var(--oro);
            color: var(--negro-fondo);
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        #resumen-pedido {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--oro);
            color: var(--negro-fondo);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .btn-enviar {
            background: var(--negro-fondo);
            color: var(--oro);
            border: 2px solid var(--negro-fondo);
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Newen Creativo" class="logo">
        <div class="config-mesa">
            <label>Mesa: <input type="number" id="numMesa" placeholder="0"></label>
        </div>
    </header>

    <div class="menu-container" id="menuLista">
        </div>

    <div id="resumen-pedido">
        <span id="totalItems">Items: 0</span>
        <button class="btn-enviar" onclick="enviarPedido()">ENVIAR A COCINA</button>
    </div>

    <script>
        const API_URL = 'TU_URL_DE_GOOGLE_APPS_SCRIPT';
        let carrito = [];

        async function cargarMenu() {
            const res = await fetch(`${API_URL}?action=getMenu`);
            const data = await res.json();
            const container = document.getElementById('menuLista');
            
            data.forEach((plato, index) => {
                const card = document.createElement('div');
                card.className = `card ${plato.disponible === 'no' ? 'agotado' : ''}`;
                
                card.innerHTML = `
                    <h3>${plato.nombre}</h3>
                    <p>${plato.descripcion}</p>
                    <span class="precio">$${plato.precio}</span>
                    
                    <div class="seccion-ingredientes">
                        <strong>Quitar (Base):</strong>
                        <div class="check-group">
                            ${plato.ingredientesBase.map(ing => `
                                <label><input type="checkbox" class="base" value="${ing}" checked> ${ing}</label>
                            `).join('')}
                        </div>
                        
                        <strong>Agregar (Extras):</strong>
                        <div class="check-group">
                            ${plato.ingredientesExtra.map(ing => `
                                <label><input type="checkbox" class="extra" value="${ing}"> ${ing}</label>
                            `).join('')}
                        </div>
                    </div>

                    <textarea class="input-notas" id="notas-${index}" placeholder="Notas: Ej. bien cocido, sin sal..."></textarea>
                    <button class="btn-agregar" onclick="agregarAlPedido(${index}, '${plato.nombre}')">AGREGAR</button>
                `;
                container.appendChild(card);
            });
        }

        function agregarAlPedido(index, nombre) {
            const card = document.getElementsByClassName('card')[index];
            const notas = document.getElementById(`notas-${index}`).value;
            
            // Ver ingredientes seleccionados/quitados
            const quitados = Array.from(card.querySelectorAll('.base:not(:checked)')).map(c => c.value);
            const agregados = Array.from(card.querySelectorAll('.extra:checked')).map(c => c.value);

            const item = {
                nombre: nombre,
                notas: notas,
                sin: quitados,
                con: agregados
            };

            carrito.push(item);
            document.getElementById('totalItems').innerText = `Items: ${carrito.length}`;
            
            // Feedback visual rápido
            const btn = card.querySelector('.btn-agregar');
            btn.innerText = "¡AÑADIDO!";
            btn.style.background = "#fff";
            setTimeout(() => { btn.innerText = "AGREGAR"; btn.style.background = "var(--oro)"; }, 1000);
        }

        async function enviarPedido() {
            const mesa = document.getElementById('numMesa').value;
            if (!mesa || carrito.length === 0) {
                alert("Por favor ingresa número de mesa y añade productos.");
                return;
            }

            const payload = {
                action: 'nuevoPedido',
                mesa: mesa,
                items: carrito
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Pedido enviado con éxito");
                carrito = [];
                document.getElementById('totalItems').innerText = `Items: 0`;
                document.getElementById('numMesa').value = '';
            }
        }

        window.onload = cargarMenu;
    </script>
</body>
</html>
