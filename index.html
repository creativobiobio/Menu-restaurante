<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newen Creativo - Menú Mesero</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #D4AF37; --negro-fondo: #1a1a1a; --negro-tarjeta: #252525; --blanco: #ffffff; --gris: #888; --rojo: #e74c3c; --verde: #2ecc71; --azul: #3498db; }
        body { background-color: var(--negro-fondo); color: var(--blanco); font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        header { text-align: center; margin-bottom: 15px; }
        .logo { max-width: 120px; filter: drop-shadow(0px 4px 10px rgba(212, 175, 55, 0.3)); margin-bottom: 10px; }
        .config-mesa { display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.1em; font-weight: 600; margin-bottom: 15px; }
        input[type="number"], textarea { background: var(--negro-tarjeta); border: 1px solid var(--oro); color: var(--blanco); padding: 12px; border-radius: 5px; outline: none; font-size: 1em; }
        
        /* DISEÑO DEL BUSCADOR */
        .buscador-container { margin-bottom: 15px; }
        .input-buscador { width: 100%; box-sizing: border-box; background: var(--negro-tarjeta); border: 1px solid var(--oro); color: var(--blanco); padding: 12px 20px; border-radius: 25px; font-size: 1em; font-family: 'Poppins', sans-serif; outline: none; transition: box-shadow 0.3s; }
        .input-buscador:focus { box-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        .filtros-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .filtros-container::-webkit-scrollbar { display: none; }
        .btn-filtro { background: transparent; color: var(--oro); border: 1px solid var(--oro); padding: 10px 18px; border-radius: 25px; cursor: pointer; white-space: nowrap; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.9em; transition: all 0.3s; }
        .btn-filtro.activo { background: var(--oro); color: var(--negro-fondo); }
        
        .menu-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--negro-tarjeta); border-top: 4px solid var(--oro); padding: 15px; border-radius: 8px; position: relative; display: flex; flex-direction: column; transition: all 0.3s; }
        .card.agotado { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .agotado-badge { display: none; position: absolute; top: 10px; right: 10px; background: var(--rojo); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8em; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .card.agotado .agotado-badge { display: block; }
        
        /* DISEÑO COLAPSABLE */
        .card-header { cursor: pointer; }
        .categoria-label { color: var(--gris); font-size: 0.75em; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card h3 { color: var(--oro); margin: 0 0 5px 0; font-family: 'Playfair Display', serif; font-size: 1.4em; line-height: 1.2; flex-grow: 1; padding-right: 10px; }
        .precio { font-weight: 600; color: var(--blanco); font-size: 1.2em; transition: color 0.3s; white-space: nowrap; }
        .precio.aumentado { color: var(--verde); }
        .desc-breve { font-size: 0.85em; color: #bbb; margin: 5px 0 10px 0; line-height: 1.4; }
        
        .btn-desplegar { background: transparent; color: var(--oro); border: 1px dashed var(--oro); padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: 600; text-transform: uppercase; font-size: 0.9em; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .btn-desplegar:active { background: rgba(212,175,55,0.1); }
        
        /* CUERPO OCULTO POR DEFECTO */
        .card-body { display: none; padding-top: 15px; border-top: 1px solid #444; margin-top: 15px; animation: fadeIn 0.3s ease-in-out; }
        .card-body.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .check-group { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 5px; border: 1px solid #333; }
        label { display: flex; align-items: center; gap: 8px; cursor: pointer; width: 100%; font-size: 0.95em; }
        input[type="checkbox"] { transform: scale(1.3); margin: 0 5px 0 0; accent-color: var(--oro); }
        .input-notas { width: 100%; box-sizing: border-box; font-size: 0.9em; resize: none; height: 50px; margin-bottom: 15px; }
        
        .acciones-container { display: flex; gap: 10px; align-items: stretch; }
        .control-cantidad { display: flex; align-items: center; background: var(--negro-fondo); border: 1px solid var(--oro); border-radius: 5px; overflow: hidden; }
        .btn-cant { background: transparent; color: var(--oro); border: none; padding: 12px 18px; font-size: 1.3em; cursor: pointer; font-weight: bold; }
        .num-cant { color: var(--blanco); padding: 0 5px; font-weight: 600; min-width: 25px; text-align: center; }
        .btn-agregar { background: var(--oro); color: var(--negro-fondo); border: none; padding: 12px; font-weight: 700; border-radius: 5px; cursor: pointer; flex-grow: 1; text-transform: uppercase; }
        
        #barra-inferior { position: fixed; bottom: 0; left: 0; right: 0; background: var(--negro-tarjeta); border-top: 2px solid var(--oro); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; z-index: 90; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .resumen-total { font-size: 1.3em; color: var(--oro); font-weight: bold; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: flex-end; z-index: 100; }
        .modal-content { background: var(--negro-fondo); width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; border-top: 2px solid var(--oro); padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; }
        .item-carrito { background: var(--negro-tarjeta); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--oro); }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; }
        .item-detalles { font-size: 0.85em; color: #ccc; margin-top: 5px; line-height: 1.4; }
        .mod-sin { color: var(--rojo); } .mod-con { color: var(--verde); } .mod-bowl { color: var(--azul); } .mod-nota { color: #f1c40f; }
        .btn-eliminar { background: transparent; color: var(--rojo); border: 1px solid var(--rojo); padding: 5px; border-radius: 4px; font-size: 0.8em; margin-top: 10px; width: 100%; cursor: pointer; }
        .btn-enviar-final { background: var(--oro); color: var(--negro-fondo); border: none; padding: 15px; width: 100%; font-size: 1.1em; font-weight: bold; border-radius: 5px; margin-top: 10px; cursor: pointer; }

        /* CONTENEDOR DE ALERTA PERSONALIZADA */
        .alerta-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; }
        .alerta-box { background: var(--negro-tarjeta); border: 2px solid var(--oro); border-radius: 10px; padding: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        .alerta-box h3 { color: var(--oro); margin-top: 0; font-family: 'Playfair Display', serif; font-size: 1.5em; margin-bottom: 10px; }
        .alerta-box p { font-size: 1em; margin-bottom: 20px; line-height: 1.4; color: var(--blanco); }
        .btn-alerta { background: var(--oro); color: var(--negro-fondo); border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 1em; transition: 0.3s; }
        .btn-alerta:active { background: #fff; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <div class="config-mesa">
            <label>MESA:</label>
            <input type="number" id="numMesa" placeholder="0" style="width: 70px; text-align: center;" oninput="syncMesa(this.value)">
        </div>
        
        <div class="buscador-container">
            <input type="text" id="buscadorMenu" class="input-buscador" placeholder="🔍 Buscar platillo o categoría (Ej: Smash)..." oninput="buscarPlatillo(this.value)">
        </div>
    </header>

    <div id="filtrosCategorias" class="filtros-container"></div>
    <div class="menu-container" id="menuLista"><p style="text-align: center; width: 100%; color: var(--oro);">Cargando menú...</p></div>

    <div id="barra-inferior" onclick="abrirModal()">
        <div style="display: flex; flex-direction: column;">
            <span id="txt-items" style="font-size:0.8em; color:var(--gris); font-weight:bold;">0 ITEMS</span>
            <span class="resumen-total" id="txt-total-barra">$0</span>
        </div>
        <button style="background:var(--oro); border:none; padding:10px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">VER PEDIDO</button>
    </div>

    <div id="modalCarrito" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:15px;">
                <h2 style="color:var(--oro); margin:0; font-family:'Playfair Display', serif;">Resumen</h2>
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-size:0.9em; font-weight:bold;">MESA:</label>
                    <input type="number" id="numMesaModal" placeholder="0" style="width:60px; padding:5px; text-align:center; font-weight:bold;" oninput="syncMesa(this.value)">
                    <button onclick="cerrarModal()" style="background:none; border:none; color:white; font-size:2em; line-height:0.5; cursor:pointer; margin-left:10px;">&times;</button>
                </div>
            </div>
            
            <div id="contenedorItemsCarrito" style="flex-grow:1; margin-bottom:10px;"></div>
            
            <div style="border-top:1px solid #333; padding-top:15px;">
                <div style="display:flex; justify-content:space-between; font-size:1.5em; font-weight:bold; margin-bottom:10px;">
                    <span>TOTAL:</span><span id="txt-total-modal" style="color:var(--oro);">$0</span>
                </div>
                <button class="btn-enviar-final" id="btn-enviar" onclick="enviarPedido()">CONFIRMAR Y ENVIAR</button>
            </div>
        </div>
    </div>

    <div id="customAlert" class="alerta-overlay">
        <div class="alerta-box">
            <h3>Atención</h3>
            <p id="customAlertMensaje"></p>
            <button class="btn-alerta" onclick="cerrarAlerta()">Entendido</button>
        </div>
    </div>

    <script>
        // AQUÍ ESTÁ TU NUEVA URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbwz1nmVa_IC6zP-nSrot6bPoHzq_Fadwq4xnbsjU6edIZSd2bgAqxwazzxiOcSXG4YcOA/exec';
        
        let carrito = []; let menuGlobal = [];
        function formatoCLP(v) { return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(v); }

        function syncMesa(valor) {
            document.getElementById('numMesa').value = valor;
            document.getElementById('numMesaModal').value = valor;
        }

        function mostrarAlerta(mensaje) {
            document.getElementById('customAlertMensaje').innerText = mensaje;
            document.getElementById('customAlert').style.display = 'flex';
        }
        function cerrarAlerta() {
            document.getElementById('customAlert').style.display = 'none';
        }

        async function inicializar() {
            try {
                const res = await fetch(`${API_URL}?action=getMenu`);
                menuGlobal = await res.json();
                renderizarFiltros(); 
                renderizarMenu('Todas', '');
            } catch (e) { document.getElementById('menuLista').innerHTML = '<p>Error de conexión. Actualiza la página.</p>'; }
        }

        function renderizarFiltros() {
            const contenedor = document.getElementById('filtrosCategorias');
            const cats = [...new Set(menuGlobal.map(p => p.categoria).filter(c => c))];
            let h = `<button class="btn-filtro activo" onclick="filtrarPorBoton('Todas', this)">Todas</button>`;
            cats.forEach(c => { h += `<button class="btn-filtro" onclick="filtrarPorBoton('${c}', this)">${c}</button>`; });
            contenedor.innerHTML = h;
        }

        function filtrarPorBoton(c, b) { 
            document.getElementById('buscadorMenu').value = '';
            document.querySelectorAll('.btn-filtro').forEach(x => x.classList.remove('activo')); 
            b.classList.add('activo'); 
            renderizarMenu(c, ''); 
        }

        function buscarPlatillo(texto) {
            texto = texto.toLowerCase().trim();
            if (texto.length >= 2) {
                document.querySelectorAll('.btn-filtro').forEach(x => x.classList.remove('activo'));
                renderizarMenu('', texto);
            } else if (texto.length === 0) {
                const btnTodas = document.querySelector('.btn-filtro'); 
                if(btnTodas) {
                    document.querySelectorAll('.btn-filtro').forEach(x => x.classList.remove('activo'));
                    btnTodas.classList.add('activo');
                }
                renderizarMenu('Todas', '');
            }
        }

        function toggleOpciones(idx) {
            const body = document.getElementById(`body-${idx}`);
            const btn = document.getElementById(`btn-toggle-${idx}`);
            if (body.classList.contains('visible')) {
                body.classList.remove('visible');
                btn.innerHTML = 'Personalizar Plato <span>▼</span>';
            } else {
                document.querySelectorAll('.card-body').forEach(b => b.classList.remove('visible'));
                document.querySelectorAll('.btn-desplegar').forEach(b => b.innerHTML = 'Personalizar Plato <span>▼</span>');
                
                body.classList.add('visible');
                btn.innerHTML = 'Ocultar Opciones <span>▲</span>';
            }
        }

        function calcularPrecioFinal(idx, pBase) {
            const card = document.getElementById(`card-${idx}`);
            const cat = menuGlobal[idx].categoria.toLowerCase();
            
            const nProteinas = card.querySelectorAll('.proteina:checked').length;
            let costoProteina = 0;
            if (nProteinas > 1) {
                costoProteina = (nProteinas - 1) * 2000;
            }

            const extrasSeleccionados = Array.from(card.querySelectorAll('.extra:checked')).map(e => e.value.toLowerCase());
            let numNormales = 0;
            let costoBebidasYCheladas = 0;

            extrasSeleccionados.forEach(ext => {
                if (ext.includes('bebida')) {
                    costoBebidasYCheladas += 1500;
                } else if (ext.includes('chelada') || ext.includes('michelada')) {
                    costoBebidasYCheladas += 1000;
                } else if (ext.includes('frutal')) {
                    costoBebidasYCheladas += 1500;
                } else {
                    numNormales++;
                }
            });

            let costoExtrasNormales = 0;
            
            if (cat.includes('bowl')) {
                if (numNormales >= 5) costoExtrasNormales = (numNormales - 4) * 1000;
            } else if (cat.includes('hamburguesa') || cat.includes('smash')) {
                if (numNormales >= 4) costoExtrasNormales = (numNormales - 3) * 1000;
            }

            const pFinal = pBase + costoProteina + costoBebidasYCheladas + costoExtrasNormales;
            const elP = card.querySelector('.precio');
            elP.innerText = formatoCLP(pFinal);
            
            if (pFinal > pBase) elP.classList.add('aumentado'); 
            else elP.classList.remove('aumentado');
            
            return pFinal;
        }

        function renderizarMenu(filtroCategoria, textoBusqueda) {
            const container = document.getElementById('menuLista'); 
            container.innerHTML = '';
            
            let filtrados = menuGlobal;

            if (textoBusqueda.length >= 2) {
                filtrados = menuGlobal.filter(p => 
                    p.nombre.toLowerCase().includes(textoBusqueda) || 
                    p.categoria.toLowerCase().includes(textoBusqueda)
                );
            } else if (filtroCategoria !== 'Todas') {
                filtrados = menuGlobal.filter(p => p.categoria === filtroCategoria);
            }

            if (filtrados.length === 0) {
                container.innerHTML = '<p style="text-align: center; width: 100%; color: var(--gris);">No se encontraron platillos con esa búsqueda.</p>';
                return;
            }
            
            filtrados.forEach((p) => {
                const idx = menuGlobal.findIndex(m => m.nombre === p.nombre);
                const agotado = p.disponible === 'no';
                const card = document.createElement('div'); card.className = `card ${agotado ? 'agotado' : ''}`;
                card.id = `card-${idx}`;
                
                const eV = p.ingredientesExtra.filter(i => i && i.toUpperCase() !== 'N/A');
                const bBowl = (p.baseBowl || []).filter(i => i && i.toUpperCase() !== 'N/A');
                const pBowl = (p.proteinaBowl || []).filter(i => i && i.toUpperCase() !== 'N/A');

                let textoExtra = "";
                const catLower = p.categoria.toLowerCase();
                if (catLower.includes('bowl')) textoExtra = "(5to ingrediente +$1.000)";
                else if (catLower.includes('hamburguesa') || catLower.includes('smash')) textoExtra = "(4to ingrediente +$1.000)";

                const tieneOpciones = eV.length > 0 || bBowl.length > 0 || pBowl.length > 0;

                card.innerHTML = `
                    <div class="agotado-badge">AGOTADO</div>
                    
                    <div class="card-header" onclick="toggleOpciones(${idx})">
                        <div class="categoria-label">${p.categoria}</div>
                        <div class="header-top">
                            <h3>${p.nombre}</h3>
                            <span class="precio">${formatoCLP(p.precio)}</span>
                        </div>
                        <p class="desc-breve">${p.descripcion}</p>
                        <button class="btn-desplegar" id="btn-toggle-${idx}">Personalizar Plato <span>▼</span></button>
                    </div>
                    
                    <div class="card-body" id="body-${idx}">
                        <div class="seccion-ingredientes">
                            ${bBowl.length ? `<strong style="color:var(--oro); display:block; margin-bottom:5px;">Elegir Base:</strong><div class="check-group">${bBowl.map(i => `<label><input type="checkbox" class="base-bowl" value="${i}"> ${i}</label>`).join('')}</div>` : ''}
                            ${pBowl.length ? `<strong style="color:var(--oro); display:block; margin-bottom:5px;">Elegir Proteína (1 incl, adicionales +$2.000):</strong><div class="check-group">${pBowl.map(i => `<label><input type="checkbox" class="proteina" value="${i}" onchange="calcularPrecioFinal(${idx}, ${p.precio})"> ${i}</label>`).join('')}</div>` : ''}
                            
                            ${eV.length ? `<strong style="color:var(--oro); display:block; margin-bottom:5px;">Agregar Opciones/Extras <span style="font-size:0.8em; font-weight:normal; color:var(--gris);">${textoExtra}</span>:</strong><div class="check-group">${eV.map(i => `<label><input type="checkbox" class="extra" value="${i}" onchange="calcularPrecioFinal(${idx}, ${p.precio})"> ${i}</label>`).join('')}</div>` : ''}
                            
                            ${!tieneOpciones ? `<p style="color:var(--gris); font-size:0.9em; font-style:italic;">Este plato no tiene extras configurables.</p>` : ''}
                        </div>
                        <textarea class="input-notas" id="notas-${idx}" placeholder="Notas y exclusiones (Ej. sin cebolla, sin papas)..."></textarea>
                        <div class="acciones-container">
                            <div class="control-cantidad"><button class="btn-cant" onclick="cambiarCant(${idx},-1)">-</button><span class="num-cant" id="cant-${idx}">1</span><button class="btn-cant" onclick="cambiarCant(${idx},1)">+</button></div>
                            <button class="btn-agregar" id="btn-add-${idx}" onclick="agregar(${idx},'${p.nombre}',${p.precio})">${agotado?'AGOTADO':'AÑADIR'}</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function cambiarCant(i, c) { const s = document.getElementById(`cant-${i}`); let n = parseInt(s.innerText) + c; if (n >= 1 && n <= 20) s.innerText = n; }

        function agregar(idx, n, pB) {
            const card = document.getElementById(`card-${idx}`);
            const cat = menuGlobal[idx].categoria;
            const nt = document.getElementById(`notas-${idx}`).value;
            const c = parseInt(document.getElementById(`cant-${idx}`).innerText);
            const pF = calcularPrecioFinal(idx, pB);
            
            const e = Array.from(card.querySelectorAll('.extra:checked')).map(x => x.value);
            const bB = Array.from(card.querySelectorAll('.base-bowl:checked')).map(x => x.value);
            const pP = Array.from(card.querySelectorAll('.proteina:checked')).map(x => x.value);
            
            for(let i=0; i<c; i++) { carrito.push({ categoria: cat, nombre: n, notas: nt, sin: [], con: e, baseE: bB, protE: pP, precio: pF }); }
            
            actualizarBarra(); 
            const btn = document.getElementById(`btn-add-${idx}`); 
            btn.innerText = `¡+${c} AÑADIDO!`; btn.style.background = "#fff";
            
            document.getElementById(`notas-${idx}`).value = '';
            document.getElementById(`cant-${idx}`).innerText = '1';
            Array.from(card.querySelectorAll('.extra')).forEach(x => x.checked = false);
            Array.from(card.querySelectorAll('.base-bowl')).forEach(x => x.checked = false);
            Array.from(card.querySelectorAll('.proteina')).forEach(x => x.checked = false);
            calcularPrecioFinal(idx, pB);

            setTimeout(() => { 
                btn.innerText = "AÑADIR"; 
                btn.style.background = "var(--oro)"; 
                toggleOpciones(idx); 
            }, 800);
        }

        function actualizarBarra() {
            const sum = carrito.reduce((a, i) => a + i.precio, 0);
            document.getElementById('txt-items').innerText = `${carrito.length} ITEM${carrito.length !== 1 ? 'S' : ''}`;
            document.getElementById('txt-total-barra').innerText = formatoCLP(sum);
        }

        function abrirModal() { 
            if (!carrito.length) { mostrarAlerta("Por favor, añade productos al carrito para continuar."); return; } 
            renderCarrito(); document.getElementById('modalCarrito').style.display='flex'; 
        }
        function cerrarModal() { document.getElementById('modalCarrito').style.display='none'; }

        function renderCarrito() {
            const cont = document.getElementById('contenedorItemsCarrito'); let h = ''; let s = 0;
            carrito.forEach((i, idx) => {
                s += i.precio;
                h += `<div class="item-carrito"><div class="item-header"><span>1x ${i.nombre}</span><span>${formatoCLP(i.precio)}</span></div>
                    <div class="item-detalles">
                        ${i.baseE?.length?`<div class="mod-bowl">🥣 Base: ${i.baseE.join(', ')}</div>`:''}
                        ${i.protE?.length?`<div class="mod-bowl">🥩 Prot: ${i.protE.join(', ')}</div>`:''}
                        ${i.con.length?`<div class="mod-con">+ Extra: ${i.con.join(', ')}</div>`:''}
                        ${i.notas?`<div class="mod-nota">📝 ${i.notas}</div>`:''}
                    </div><button class="btn-eliminar" onclick="eliminar(${idx})">Eliminar Plato</button></div>`;
            });
            cont.innerHTML = h; document.getElementById('txt-total-modal').innerText = formatoCLP(s);
        }

        function eliminar(i) { carrito.splice(i, 1); actualizarBarra(); if (!carrito.length) cerrarModal(); else renderCarrito(); }

        async function enviarPedido() {
            const m = document.getElementById('numMesaModal').value || document.getElementById('numMesa').value; 
            if (!m) { mostrarAlerta("Para continuar ingresar numero de mesa por favor."); return; }
            
            const b = document.getElementById('btn-enviar'); b.innerText = "ENVIANDO A COCINA..."; b.disabled = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'nuevoPedido', mesa: m, items: carrito }) });
                if (res.ok) { 
                    mostrarAlerta(`✅ ¡Pedido de Mesa ${m} enviado a cocina!`); 
                    carrito = []; actualizarBarra(); cerrarModal(); 
                    document.getElementById('numMesa').value = ''; document.getElementById('numMesaModal').value = '';
                    document.getElementById('buscadorMenu').value = '';
                    
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    renderizarMenu('Todas', '');
                    document.querySelectorAll('.btn-filtro').forEach(x => { x.classList.remove('activo'); if(x.innerText === 'Todas') x.classList.add('activo'); });
                }
            } catch (e) { mostrarAlerta("Hubo un error de conexión. Inténtalo nuevamente."); } finally { b.innerText = "CONFIRMAR Y ENVIAR"; b.disabled = false; }
        }
        window.onload = inicializar;
    </script>
</body>
</html>
