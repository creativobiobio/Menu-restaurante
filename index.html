<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Burger - Menú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Si ves esto en pantalla, es que React no cargó */
        #fallback { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 10; }
    </style>
</head>
<body>
    <div id="fallback">
        <p style="color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Cargando interfaz...</p>
    </div>
    
    <div id="root"></div>

    <script type="text/babel">
        // Forzamos que los iconos de Lucide estén disponibles
        const { Plus, X, Utensils, Coffee, Flame, Salad, ClipboardList, MapPin, CheckCircle2, Minus, Loader2, AlertCircle, ChevronRight, Info } = lucide;

        const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4yZc7M7meCPQ6Mc0WmYpw08NceifjZ2ccaXCgCImrOePe46mgGKnAdaeLVVf6Zu2PfMUpO7NYJ7tD/pub?gid=0&single=true&output=csv";

        const clean = (t) => (t || "").toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const formatPrice = (p) => `$${(Number(p) || 0).toLocaleString('es-CL')}`;

        const App = () => {
            const [menu, setMenu] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('burgers');
            const [cart, setCart] = React.useState([]);
            const [table, setTable] = React.useState('');
            const [selected, setSelected] = React.useState(null);
            const [isPreview, setIsPreview] = React.useState(false);

            React.useEffect(() => {
                // Quitamos el mensaje de fallback al iniciar React
                const fb = document.getElementById('fallback');
                if (fb) fb.style.display = 'none';

                fetch(API_URL)
                    .then(res => res.text())
                    .then(csv => {
                        const lines = csv.split(/\r?\n/).filter(l => l.trim() !== "");
                        const headers = lines[0].split(',').map(h => clean(h).replace(/[^a-z]/g, ''));
                        
                        const items = lines.slice(1).map(line => {
                            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            const obj = {};
                            headers.forEach((h, i) => {
                                let val = values[i] ? values[i].trim().replace(/^"|"$/g, '') : "";
                                obj[h] = val;
                            });
                            return obj;
                        });

                        const filter = (c) => items.filter(i => clean(i.categoria) === clean(c));

                        setMenu({
                            burgers: filter('burgers'),
                            makebowl: filter('makebowl'),
                            hotbowls: filter('hotbowls'),
                            churrascos: filter('churrascos'),
                            calientes: filter('calientes'),
                            frios: filter('frios')
                        });
                        setLoading(false);
                    })
                    .catch(e => {
                        setError("No se pudo conectar con Google Sheets.");
                        setLoading(false);
                    });
            }, []);

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-black">
                    <div className="w-10 h-10 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-zinc-500 font-bold uppercase text-[10px] tracking-widest">Sincronizando...</p>
                </div>
            );

            if (error) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-black text-white">
                    <AlertCircle className="text-red-500 mb-4" size={40} />
                    <h2 className="text-yellow-500 font-black uppercase mb-2">Error de Carga</h2>
                    <p className="text-zinc-500 text-xs mb-6">{error}</p>
                    <button onClick={() => location.reload()} className="bg-yellow-500 text-black px-6 py-2 rounded-full font-black uppercase text-[10px]">Reintentar</button>
                </div>
            );

            const activeItems = activeTab === 'bebestibles' ? [...menu.calientes, ...menu.frios] : (menu[activeTab] || []);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-black">
                    {/* Header */}
                    <header className="p-6 sticky top-0 bg-black/90 backdrop-blur-md z-40 border-b border-zinc-900">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-2xl font-black italic text-yellow-500 uppercase tracking-tighter leading-none">MAKE YOUR BURGER</h1>
                                <p className="text-[10px] text-zinc-600 font-bold mt-1 uppercase">Curanilahue</p>
                            </div>
                            <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-2 flex flex-col items-center">
                                <span className="text-[8px] text-zinc-500 font-black uppercase mb-1 leading-none">Mesa</span>
                                <input type="number" placeholder="00" value={table} onChange={e=>setTable(e.target.value)} className="w-8 bg-transparent text-center text-yellow-500 font-black outline-none" />
                            </div>
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                            {[
                                {id:'burgers', icon:Flame, label:'Burgers'},
                                {id:'makebowl', icon:Salad, label:'Bowl'},
                                {id:'hotbowls', icon:Utensils, label:'Hot Bowls'},
                                {id:'churrascos', icon:ClipboardList, label:'Churrascos'},
                                {id:'bebestibles', icon:Coffee, label:'Bebidas'}
                            ].map(t => (
                                <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`px-4 py-3 rounded-2xl flex flex-col items-center min-w-[70px] transition-all ${activeTab === t.id ? 'bg-yellow-500 text-black' : 'bg-zinc-900 text-zinc-500'}`}>
                                    <t.icon size={16} />
                                    <span className="text-[8px] font-black uppercase mt-1 leading-none">{t.label}</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Lista */}
                    <main className="p-4 pb-32 flex-1">
                        {activeItems.map(item => {
                            const isAvailable = (item.disponible || "").trim().toUpperCase() === 'SI';
                            return (
                                <div key={item.id} className={`p-5 bg-zinc-900/30 border border-zinc-900 rounded-[2rem] mb-3 ${!isAvailable ? 'opacity-30 pointer-events-none' : ''}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex-1">
                                            <h3 className="text-lg font-black uppercase italic leading-tight">{item.nombre}</h3>
                                            <p className="text-[11px] text-zinc-500 mt-2 leading-tight">{item.descripcion || "Sin descripción."}</p>
                                        </div>
                                        <span className="text-white font-black text-xl ml-4">{formatPrice(item.precio)}</span>
                                    </div>
                                    <button onClick={()=>{
                                        const finalPrice = Number(item.precio || 0);
                                        setCart([...cart, { ...item, cartId: Math.random(), finalPrice }]);
                                    }} className="w-full bg-zinc-900 text-zinc-400 py-3 rounded-xl font-black text-[10px] uppercase border border-zinc-800 hover:bg-yellow-500 hover:text-black">Agregar</button>
                                </div>
                            );
                        })}
                    </main>

                    {/* Botón Pedido */}
                    {cart.length > 0 && (
                        <div className="fixed bottom-6 left-4 right-4 z-50">
                            <button onClick={()=>setIsPreview(true)} className="w-full bg-yellow-500 text-black h-16 rounded-2xl flex justify-between items-center px-8 shadow-2xl font-black italic active:scale-95 transition-all">
                                <span>{cart.length} PROD.</span>
                                <span className="uppercase text-sm tracking-tighter">Ver Carrito • {formatPrice(cart.reduce((s,i)=>s+i.finalPrice, 0))}</span>
                            </button>
                        </div>
                    )}

                    {/* Preview Pedido */}
                    {isPreview && (
                        <div className="fixed inset-0 z-[70] bg-black p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-4xl font-black italic text-yellow-500 tracking-tighter uppercase">Mi Pedido</h2>
                                <button onClick={()=>setIsPreview(false)} className="bg-zinc-900 p-3 rounded-full text-white"><X size={20}/></button>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-4">
                                {cart.map((item, idx) => (
                                    <div key={item.cartId} className="bg-zinc-900/50 p-6 rounded-[2.5rem] border border-zinc-800 flex justify-between items-center">
                                        <div className="flex flex-col">
                                            <span className="font-black text-lg uppercase italic">{item.nombre}</span>
                                            <span className="text-yellow-500 font-bold text-sm">{formatPrice(item.finalPrice)}</span>
                                        </div>
                                        <button onClick={()=>{
                                            const nc = [...cart]; nc.splice(idx,1); setCart(nc);
                                            if(nc.length === 0) setIsPreview(false);
                                        }} className="text-zinc-700 hover:text-red-500"><Minus size={20}/></button>
                                    </div>
                                ))}
                            </div>
                            <div className="pt-8 border-t border-zinc-900 mt-6">
                                <div className="flex justify-between items-end mb-8">
                                    <div><span className="text-zinc-600 text-[10px] font-black uppercase">Mesa {table || '?'}</span><span className="text-5xl font-black italic block">{formatPrice(cart.reduce((s,i)=>s+i.finalPrice, 0))}</span></div>
                                </div>
                                <button disabled={!table} onClick={()=>{alert("¡Pedido enviado!"); setCart([]); setIsPreview(false);}} className="w-full bg-white text-black font-black py-6 rounded-2xl text-xl uppercase tracking-tighter disabled:opacity-20">Confirmar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
