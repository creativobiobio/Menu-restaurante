<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Your Burger</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { background:#000; color:#fff; margin:0; font-family:sans-serif; }
#fallback { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; }
</style>
</head>

<body>

<div id="fallback">Cargando interfaz...</div>
<div id="root"></div>

<script>

const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4yZc7M7meCPQ6Mc0WmYpw08NceifjZ2ccaXCgCImrOePe46mgGKnAdaeLVVf6Zu2PfMUpO7NYJ7tD/pub?gid=0&single=true&output=csv";

const clean = t => (t||"").toLowerCase().trim();
const formatPrice = p => "$"+(Number(p)||0).toLocaleString("es-CL");

function App(){

const [menu,setMenu]=React.useState(null);
const [cart,setCart]=React.useState([]);
const [table,setTable]=React.useState("");

React.useEffect(()=>{

Papa.parse(API_URL,{
download:true,
header:true,
complete:(res)=>{

const items = res.data;

setMenu({
burgers: items.filter(i=>clean(i.categoria)==="burgers")
});

document.getElementById("fallback").style.display="none";
}
});

},[]);

if(!menu) return null;

return React.createElement("div",{className:"p-4"},

React.createElement("h1",null,"MAKE YOUR BURGER"),

React.createElement("input",{
placeholder:"Mesa",
value:table,
onChange:e=>setTable(e.target.value)
}),

menu.burgers.map(i=>
React.createElement("div",{key:i.nombre},

React.createElement("h3",null,i.nombre),
React.createElement("p",null,formatPrice(i.precio)),

React.createElement("button",{
onClick:()=>{
if(!table){ alert("Ingresa mesa"); return;}
setCart([...cart,i]);
}
},"Agregar")

)
)

);
}

ReactDOM.createRoot(document.getElementById("root")).render(
React.createElement(App)
);

</script>

</body>
</html>
