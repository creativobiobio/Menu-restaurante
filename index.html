<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Your Burger</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { background:#000; color:#fff; margin:0; font-family:sans-serif; }
</style>
</head>

<body>

<div id="root"></div>

<script>
// 🔴 Mostrar errores en pantalla (nunca más pantalla negra)
window.onerror = function(msg, url, line) {
    document.body.innerHTML = `
        <div style="background:black;color:white;padding:20px">
            <h2 style="color:red">Error detectado</h2>
            <p>${msg}</p>
            <p>Línea: ${line}</p>
        </div>
    `;
};
</script>

<script>

const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4yZc7M7meCPQ6Mc0WmYpw08NceifjZ2ccaXCgCImrOePe46mgGKnAdaeLVVf6Zu2PfMUpO7NYJ7tD/pub?gid=0&single=true&output=csv";

// limpia texto (anti errores Gemini / Sheets)
const clean = (t) => (t || "")
.toString()
.toLowerCase()
.trim()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.replace(/"/g,"");

// precio seguro
const formatPrice = (p) => "$" + (Number(p)||0).toLocaleString("es-CL");

// acceso flexible a columnas (aunque estén mal escritas)
const getField = (obj, keys) => {
    for (let k of keys) {
        if (obj[k] !== undefined) return obj[k];
    }
    return "";
};

function App(){

const [menu,setMenu] = React.useState(null);
const [cart,setCart] = React.useState([]);
const [table,setTable] = React.useState("");
const [search,setSearch] = React.useState("");
const [tab,setTab] = React.useState("burgers");

React.useEffect(()=>{

Papa.parse(API_URL,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:(res)=>{

        let items = res.data || [];

        // 🧠 normalización robusta
        items = items.map(row => {

            const categoria = clean(getField(row, ["categoria","Categoría","category"]));
            const nombre = getField(row, ["nombre","Nombre","name"]);
            const descripcion = getField(row, ["descripcion","Descripción","desc"]);
            const precio = getField(row, ["precio","Precio","price"]);
            const disponible = clean(getField(row, ["disponible","Disponible","stock"]));

            return {
                categoria,
                nombre,
                descripcion,
                precio,
                disponible
            };
        });

        // eliminar basura
        items = items.filter(i => i.nombre);

        const filter = (cat) => items.filter(i => i.categoria === cat);

        setMenu({
            burgers: filter("burgers"),
            bebidas: [...filter("calientes"), ...filter("frios")]
        });

    },
    error:()=>{
        throw new Error("Error cargando Google Sheets");
    }
});

},[]);

// loading
if(!menu){
return React.createElement("div",{className:"flex items-center justify-center h-screen"},
"Cargando menú..."
);
}

// filtro
const items = (tab==="bebidas"?menu.bebidas:menu.burgers)
.filter(i => clean(i.nombre).includes(clean(search)));

return React.createElement("div",{className:"max-w-md mx-auto p-4"},

// título
React.createElement("h1",{className:"text-2xl font-bold text-yellow-500 mb-4"},
"MAKE YOUR BURGER"
),

// mesa
React.createElement("input",{
placeholder:"Número de mesa",
value:table,
onChange:e=>setTable(e.target.value),
className:"w-full p-2 mb-3 text-black rounded"
}),

// buscador
React.createElement("input",{
placeholder:"Buscar producto",
value:search,
onChange:e=>setSearch(e.target.value),
className:"w-full p-2 mb-4 text-black rounded"
}),

// tabs
React.createElement("div",{className:"flex gap-2 mb-4"},
["burgers","bebidas"].map(t=>
React.createElement("button",{
key:t,
onClick:()=>setTab(t),
className:`px-3 py-2 rounded ${tab===t?"bg-yellow-500 text-black":"bg-zinc-800"}`
},t)
)
),

// productos
items.map(i=>
React.createElement("div",{key:i.nombre,className:"bg-zinc-900 p-3 mb-3 rounded"},

React.createElement("h3",{className:"font-bold"},i.nombre),

React.createElement("p",{className:"text-sm text-zinc-400"},
i.descripcion || ""
),

React.createElement("div",{className:"flex justify-between items-center mt-2"},

React.createElement("span",null,formatPrice(i.precio)),

React.createElement("button",{
onClick:()=>{
if(!table){
alert("Ingresa número de mesa");
return;
}
setCart([...cart,{...i,id:Math.random()}]);
},
className:"bg-yellow-500 text-black px-3 py-1 rounded"
},"Agregar")

)
)
),

// carrito
cart.length>0 && React.createElement("div",{className:"fixed bottom-0 left-0 right-0 bg-black p-4 border-t border-zinc-800"},

React.createElement("div",{className:"flex justify-between mb-2"},
React.createElement("span",null,cart.length+" productos"),
React.createElement("span",null,
formatPrice(cart.reduce((s,i)=>s+Number(i.precio||0),0))
)
),

React.createElement("button",{
onClick:()=>{
alert("Pedido enviado");
setCart([]);
},
className:"w-full bg-white text-black p-2 rounded"
},"Confirmar pedido")

)

);
}

ReactDOM.createRoot(document.getElementById("root")).render(
React.createElement(App)
);

</script>

</body>
</html>
